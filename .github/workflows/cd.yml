name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_NAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_NAME }}/ada502mq:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_NAME }}/ada502mq:latest
          
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
        - name: Deploy to external VM
          uses: appleboy/ssh-action@v0.1.6
          with:
            host: ${{ secrets.VM_HOST }}
            username: ${{ secrets.VM_USER }}
            key: ${{ secrets.VM_SSH_KEY }}
            script: |
                sudo docker pull ${{ secrets.DOCKER_NAME }}/ada502mq:latest

                sudo docker rm -f ada502mq || true

                sudo docker run -d \
                    --name ada502mq \
                    --restart unless-stopped \
                    --network app-network \
                    -e IP="${{ secrets.IP }}" \
                    -e MET_CLIENT_ID="${{ secrets.MET_CLIENT_ID }}" \
                    -e MET_CLIENT_SECRET="${{ secrets.MET_CLIENT_SECRET }}" \
                    -e DB_NAME="${{ secrets.DB_NAME }}" \
                    -e DB_USER="${{ secrets.DB_USER }}" \
                    -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                    ${{ secrets.DOCKER_NAME }}/ada502mq:latest